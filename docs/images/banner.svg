<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6B4C9A"/>
      <stop offset="100%" stop-color="#0088CC"/>
    </linearGradient>
    <linearGradient id="iconGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" fill="url(#bg)"/>

  <!-- Subtle diagonal lines -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="200" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="100" y1="0" x2="300" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="200" y1="0" x2="400" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="300" y1="0" x2="500" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="400" y1="0" x2="600" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="500" y1="0" x2="700" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="600" y1="0" x2="800" y2="200" stroke="#fff" stroke-width="1"/>
    <line x1="700" y1="0" x2="900" y2="200" stroke="#fff" stroke-width="1"/>
  </g>

  <!-- Jellyfin logo shape (left) -->
  <g transform="translate(70, 100)">
    <circle cx="0" cy="0" r="38" fill="url(#iconGlow)" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
    <!-- Play button triangle inside -->
    <polygon points="-12,-18 22,0 -12,18" fill="#ffffff" opacity="0.85"/>
  </g>

  <!-- Sync arrows connecting -->
  <g transform="translate(130, 100)" opacity="0.7">
    <line x1="0" y1="-6" x2="36" y2="-6" stroke="#ffffff" stroke-width="2"/>
    <polygon points="36,-12 46,-6 36,0" fill="#ffffff"/>
    <line x1="46" y1="6" x2="10" y2="6" stroke="#ffffff" stroke-width="2"/>
    <polygon points="10,0 0,6 10,12" fill="#ffffff"/>
  </g>

  <!-- Telegram circle (right) -->
  <g transform="translate(205, 100)">
    <circle cx="0" cy="0" r="32" fill="url(#iconGlow)" stroke="#ffffff" stroke-width="2.5" opacity="0.9"/>
    <!-- Simplified paper plane -->
    <path d="M-16,2 L16,-10 L2,14 Z" fill="#ffffff" opacity="0.85"/>
    <path d="M16,-10 L0,2 L2,14" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Title text -->
  <text x="270" y="92" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#ffffff" letter-spacing="0.5">
    jellyfin-telegram-channel-sync
  </text>

  <!-- Subtitle -->
  <text x="270" y="124" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#ffffff" opacity="0.7" letter-spacing="0.3">
    Automated Jellyfin access control via Telegram membership
  </text>
</svg>
