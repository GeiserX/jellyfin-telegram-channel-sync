<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6B4C9A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0088CC;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#523A76;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#006699;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="200" rx="12" ry="12" fill="url(#bg)" />

  <!-- Subtle pattern overlay -->
  <rect width="900" height="200" rx="12" ry="12" fill="url(#bg)" opacity="0.95" />

  <!-- Left icon: Jellyfin-style user silhouette -->
  <g transform="translate(80, 100)">
    <!-- User circle -->
    <circle cx="0" cy="-18" r="16" fill="none" stroke="white" stroke-width="2.5" opacity="0.9"/>
    <!-- User body -->
    <path d="M-22 18 C-22 2, -12 -2, 0 -2 C12 -2, 22 2, 22 18" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Sync arrows in center-left area -->
  <g transform="translate(140, 100)">
    <!-- Arrow right -->
    <path d="M0 -8 L20 -8 L16 -14 M20 -8 L16 -2" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    <!-- Arrow left -->
    <path d="M20 8 L0 8 L4 2 M0 8 L4 14" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  </g>

  <!-- Right icon: Telegram-style paper plane -->
  <g transform="translate(190, 100)">
    <path d="M-14 2 L14 -12 L4 14 L0 2 Z" fill="none" stroke="white" stroke-width="2.5" stroke-linejoin="round" opacity="0.9"/>
    <line x1="14" y1="-12" x2="0" y2="2" stroke="white" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Title text -->
  <text x="460" y="95" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="600" fill="white" text-anchor="middle" letter-spacing="0.5">
    jellyfin-telegram-channel-sync
  </text>

  <!-- Subtitle -->
  <text x="460" y="125" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="white" text-anchor="middle" opacity="0.8" letter-spacing="0.3">
    Automated Jellyfin access control through Telegram channel membership
  </text>
</svg>
