<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B4C9A"/>
      <stop offset="100%" style="stop-color:#0D1B2A"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="32" fill="url(#bg)"/>
  
  <!-- Left: Jellyfin-style play icon -->
  <g transform="translate(68,128)">
    <path d="M-26,-36 L26,0 L-26,36 Z" fill="white" opacity="0.9"/>
  </g>
  
  <!-- Center: sync arrows connecting left and right -->
  <g transform="translate(128,128)">
    <!-- Top arrow going right -->
    <path d="M-16,-22 L16,-22" stroke="white" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M10,-28 L18,-22 L10,-16" stroke="white" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bottom arrow going left -->
    <path d="M16,22 L-16,22" stroke="white" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round"/>
    <path d="M-10,16 L-18,22 L-10,28" stroke="white" stroke-width="3" fill="none" opacity="0.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Right: Telegram paper airplane -->
  <g transform="translate(188,128)">
    <!-- Clean single-shape paper airplane pointing upper-right -->
    <path d="M-30,6 L22,-22 L8,24 L-4,6 Z" fill="white" opacity="0.9"/>
    <!-- Fold shadow (subtle) -->
    <path d="M-4,6 L22,-22 L8,24 L2,16 Z" fill="white" opacity="0.55"/>
  </g>
</svg>
