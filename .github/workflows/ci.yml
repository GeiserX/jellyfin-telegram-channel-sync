name: CI
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: [self-hosted, Linux, X64]
    # Do not run untrusted fork PR code on the self-hosted runner.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r app/requirements.txt && pip install pytest pytest-cov
      - run: pytest --cov --cov-report=xml -v
        env:
          TELEGRAM_API_ID: "12345"
          TELEGRAM_API_HASH: "fakehash"
          TELEGRAM_CHANNEL: "-1001234567890"
          THRESHOLD_ENTRIES: "5"
          JELLYFIN_URL: "http://localhost:8096"
          JELLYFIN_API_KEY: "fakekey"
      - uses: codecov/codecov-action@v7
        if: github.event_name == 'push'
        with:
          fail_ci_if_error: false